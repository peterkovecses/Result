name: Publish to NuGet

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore -c Release

    - name: Test
      run: dotnet test --no-build -c Release --verbosity normal

    - name: Pack
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      run: dotnet pack src/Kovecses.Result/Kovecses.Result.csproj -c Release -o out
        && dotnet pack src/Kovecses.Result.AspNetCore/Kovecses.Result.AspNetCore.csproj -c Release -o out
        && dotnet pack src/Kovecses.Result.FluentAssertions/Kovecses.Result.FluentAssertions.csproj -c Release -o out

    - name: Push to NuGet
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      run: dotnet nuget push "out/*.nupkg" --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate
